<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Pengumuman - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans antialiased text-slate-800 pb-24 md:pb-8">

    <header class="bg-slate-900 text-white p-4 shadow-md sticky top-0 z-40">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <a href="admin-dashboard.html" class="w-8 h-8 rounded-full bg-slate-800 hover:bg-slate-700 flex items-center justify-center transition active:scale-95">
                    <i class="fa-solid fa-arrow-left text-sm"></i>
                </a>
                <h1 class="font-bold text-lg tracking-wide flex items-center gap-2">
                    <i class="fa-solid fa-bullhorn text-sky-400"></i> Papan Pengumuman
                </h1>
            </div>
            <button onclick="bukaTambahNote()" class="hidden md:flex bg-sky-500 hover:bg-sky-600 text-white text-sm font-bold py-2 px-4 rounded-lg items-center gap-2 transition active:scale-95 shadow-md">
                <i class="fa-solid fa-plus"></i> Buat Pengumuman
            </button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 md:px-6 py-8 w-full">
        <div class="mb-6 flex justify-between items-end">
            <div>
                <h2 class="text-2xl font-black text-slate-800">Riwayat Pengumuman</h2>
                <p class="text-sm text-slate-500">Info yang lu publish bakal muncul di dashboard creator.</p>
            </div>
            <button onclick="loadNotes()" class="text-sky-600 hover:text-sky-800 font-bold text-sm flex items-center gap-1 transition active:scale-95">
                <i class="fa-solid fa-rotate-right"></i> Refresh
            </button>
        </div>

        <div id="noteListContainer" class="space-y-6">
            <div class="text-center py-10 text-slate-400">
                <i class="fa-solid fa-circle-notch fa-spin text-3xl mb-3 text-sky-500"></i>
                <p>Menarik data pengumuman...</p>
            </div>
        </div>
    </main>

    <button onclick="bukaTambahNote()" class="md:hidden fixed bottom-6 right-5 w-14 h-14 bg-sky-500 hover:bg-sky-600 text-white rounded-full shadow-2xl flex items-center justify-center text-2xl transition-transform active:scale-90 z-40">
        <i class="fa-solid fa-plus"></i>
    </button>

    <div id="modalNote" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex justify-center items-center p-4 transition-opacity">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all border-t-4 border-sky-500">
            <div class="bg-slate-50 border-b border-slate-100 p-4 flex justify-between items-center">
                <h3 id="modalTitle" class="font-black text-slate-800 text-lg flex items-center gap-2"><i class="fa-solid fa-pen-to-square text-sky-500"></i> Tulis Pengumuman</h3>
                <button onclick="tutupModal()" class="text-slate-400 hover:text-rose-500 transition"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="p-6">
                <form id="formNote" class="space-y-4">
                    <input type="hidden" id="inputIdNote">
                    
                    <div>
                        <label class="block text-xs font-bold text-slate-700 mb-1">Judul Info / Update <span class="text-rose-500">*</span></label>
                        <input type="text" id="inputJudulNote" placeholder="Misal: Update Algoritma Baru!" required class="bg-white border border-slate-200 text-sm rounded-lg focus:border-sky-500 focus:ring-1 focus:ring-sky-500 block w-full p-2.5">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-700 mb-1">Isi Pesan <span class="text-rose-500">*</span></label>
                        <textarea id="inputIsiNote" rows="4" placeholder="Tulis detail pengumuman di sini..." required class="bg-white border border-slate-200 text-sm rounded-lg focus:border-sky-500 focus:ring-1 focus:ring-sky-500 block w-full p-2.5"></textarea>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-700 mb-1">Link Gambar <span class="text-slate-400 font-normal">(Opsional)</span></label>
                        <input type="url" id="inputGambarNote" placeholder="Paste URL gambar (https://...)" class="bg-white border border-slate-200 text-sm rounded-lg focus:border-sky-500 focus:ring-1 focus:ring-sky-500 block w-full p-2.5">
                        <p class="text-[10px] text-slate-500 mt-1"><i class="fa-solid fa-circle-info"></i> Upload gambar ke Discord/Postimages, lalu copy link image address-nya.</p>
                    </div>
                    
                    <button type="submit" id="btnSimpanNote" class="w-full bg-sky-500 hover:bg-sky-600 text-white font-bold py-3.5 rounded-xl mt-6 active:scale-95 transition shadow-md flex justify-center items-center gap-2">
                        <i class="fa-solid fa-paper-plane"></i> PUBLISH SEKARANG
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzA1Vx-wdocSAWoRv4SZyws3Ut2nVGO8UQpieFKIoAoT_KuLPU72C0qlJ7hhmY2V6QP/exec';
        
        let globalNotesAdmin = []; // Variabel nyimpen data note di halaman ini

        function tutupModal() {
            document.getElementById('modalNote').classList.add('hidden');
        }

        // Fungsi Buka Form buat Nambah Baru
        function bukaTambahNote() {
            document.getElementById('formNote').reset();
            document.getElementById('inputIdNote').value = ''; // Kosongin ID
            document.getElementById('modalTitle').innerHTML = '<i class="fa-solid fa-pen-to-square text-sky-500"></i> Tulis Pengumuman';
            document.getElementById('btnSimpanNote').innerHTML = '<i class="fa-solid fa-paper-plane"></i> PUBLISH SEKARANG';
            document.getElementById('btnSimpanNote').className = "w-full bg-sky-500 hover:bg-sky-600 text-white font-bold py-3.5 rounded-xl mt-6 active:scale-95 transition shadow-md flex justify-center items-center gap-2";
            document.getElementById('modalNote').classList.remove('hidden');
        }

        // Fungsi Buka Form buat Ngedit
        function bukaEditNote(id) {
            const note = globalNotesAdmin.find(n => n.id === id);
            if(!note) return;
            
            // Isi form dengan data lama
            document.getElementById('inputIdNote').value = note.id;
            document.getElementById('inputJudulNote').value = note.judul;
            document.getElementById('inputIsiNote').value = note.isi;
            document.getElementById('inputGambarNote').value = note.link_gambar;
            
            // Ganti tampilan tombol dan judul Modal
            document.getElementById('modalTitle').innerHTML = '<i class="fa-solid fa-pen text-amber-500"></i> Edit Pengumuman';
            document.getElementById('btnSimpanNote').innerHTML = '<i class="fa-solid fa-save"></i> SIMPAN PERUBAHAN';
            document.getElementById('btnSimpanNote').className = "w-full bg-amber-500 hover:bg-amber-600 text-white font-bold py-3.5 rounded-xl mt-6 active:scale-95 transition shadow-md flex justify-center items-center gap-2";
            
            document.getElementById('modalNote').classList.remove('hidden');
        }

        function loadNotes() {
            const container = document.getElementById('noteListContainer');
            container.innerHTML = '<div class="text-center py-10 text-slate-400"><i class="fa-solid fa-circle-notch fa-spin text-3xl mb-3 text-sky-500"></i><p>Menyinkronkan Data...</p></div>';
            
            fetch(API_URL + '?action=get_notes&t=' + new Date().getTime())
                .then(res => res.json())
                .then(data => {
                    container.innerHTML = ''; 
                    if(data.status === 'success' && data.data.length > 0) {
                        globalNotesAdmin = data.data; // Simpan data ke variabel global

                        data.data.forEach(n => {
                            let imgHtml = '';
                            if (n.link_gambar && n.link_gambar.startsWith('http')) {
                                imgHtml = `
                                <div class="mt-4 rounded-xl overflow-hidden border border-slate-200 bg-slate-100 max-h-64">
                                    <img src="${n.link_gambar}" alt="Attachment" class="w-full h-full object-cover" onerror="this.style.display='none'">
                                </div>`;
                            }

                            let html = `
                            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 lg:p-6 transition hover:shadow-md relative overflow-hidden group">
                                <div class="absolute top-0 left-0 w-1.5 h-full bg-sky-400"></div>
                                <div class="flex justify-between items-start gap-4">
                                    <div class="flex-1">
                                        <div class="flex items-center justify-between mb-2">
                                            <div class="flex items-center gap-2">
                                                <span class="text-[10px] font-black px-2 py-0.5 rounded bg-sky-100 text-sky-700 uppercase"><i class="fa-solid fa-thumbtack mr-1"></i> PENGUMUMAN</span>
                                                <span class="text-xs font-bold text-slate-400"><i class="fa-regular fa-clock"></i> ${n.tanggal}</span>
                                            </div>
                                        </div>
                                        <h3 class="font-black text-slate-800 text-lg sm:text-xl">${n.judul}</h3>
                                        <p class="text-sm text-slate-600 mt-2 whitespace-pre-wrap leading-relaxed">${n.isi}</p>
                                        ${imgHtml}
                                    </div>
                                </div>
                                <div class="mt-5 pt-4 border-t border-slate-100 flex gap-3 justify-end opacity-100 lg:opacity-0 lg:group-hover:opacity-100 transition-opacity">
                                    <button onclick="bukaEditNote('${n.id}')" class="text-sm font-bold text-amber-600 hover:text-amber-800 bg-amber-50 px-4 py-2 rounded-lg transition active:scale-95 border border-amber-200">
                                        <i class="fa-solid fa-pen"></i> Edit
                                    </button>
                                    <button onclick="hapusNote('${n.id}')" class="text-sm font-bold text-rose-600 hover:text-rose-800 bg-rose-50 px-4 py-2 rounded-lg transition active:scale-95 border border-rose-200">
                                        <i class="fa-solid fa-trash"></i> Hapus
                                    </button>
                                </div>
                            </div>`;
                            container.innerHTML += html;
                        });
                    } else {
                        container.innerHTML = '<div class="text-center py-12 text-slate-400 bg-white rounded-2xl border border-dashed border-slate-300"><i class="fa-regular fa-message text-4xl mb-3 text-slate-300"></i><p>Belum ada pengumuman.</p></div>';
                    }
                })
                .catch(err => {
                    container.innerHTML = '<p class="text-center text-rose-500 py-4 font-bold">Gagal mengambil data.</p>';
                });
        }

        // Logic Submit (Nambah Baru ATAU Ngedit)
        document.getElementById('formNote').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSimpanNote');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-2"></i> MEMPROSES...';
            btn.disabled = true;

            const idNote = document.getElementById('inputIdNote').value;
            const isEdit = idNote !== ''; // Kalau ada ID-nya berarti lagi mode Edit

            const params = new URLSearchParams();
            params.append('action', isEdit ? 'edit_note' : 'tambah_note'); // Pintar milih aksi
            
            if (isEdit) params.append('id_note', idNote);
            params.append('judul', document.getElementById('inputJudulNote').value);
            params.append('isi', document.getElementById('inputIsiNote').value);
            params.append('link_gambar', document.getElementById('inputGambarNote').value);

            fetch(API_URL, { method: 'POST', body: params })
                .then(res => res.json())
                .then(data => {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    if(data.status === 'success') {
                        tutupModal(); 
                        document.getElementById('formNote').reset(); 
                        loadNotes(); 
                    } else { alert("❌ Gagal: " + data.message); }
                });
        });

        // Logic Hapus Pengumuman
        function hapusNote(id) {
            if(!confirm("Yakin mau menghapus pengumuman ini, Bos? Data ga bisa balik lagi lho.")) return;
            
            const params = new URLSearchParams();
            params.append('action', 'hapus_note');
            params.append('id_note', id);

            fetch(API_URL, { method: 'POST', body: params })
                .then(res => res.json())
                .then(data => {
                    if(data.status === 'success') {
                        loadNotes(); // Reload data setelah hapus
                    } else {
                        alert("❌ Gagal hapus: " + data.message);
                    }
                })
                .catch(err => alert("Gagal koneksi ke server!"));
        }

        window.onload = () => { loadNotes(); };
    </script>
</body>
</html>
